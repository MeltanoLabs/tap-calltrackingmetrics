version: 1
send_anonymous_usage_stats: true
project_id: tap-calltrackingmetrics
default_environment: test
environments:
- name: test
plugins:
  extractors:
  - name: tap-calltrackingmetrics
    namespace: tap_calltrackingmetrics
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging
    settings:
    - name: access_key
    - name: secret_key
      sensitive: true
    - name: start_date
      kind: date_iso8601
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-duckdb
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-duckdb.git
